{% extends 'base.html' %}
{% load static %}

{% block content %}

<h2>Consultar Livro pelo Nome</h2>

<form method="GET" action="{% url 'consultar' %}">
  <input type="text" name="q" placeholder="Digite o nome do livro">
  <button type="submit">Buscar</button>
</form>

<hr>

{% if resultados %}
  <ul>
    {% for livro in resultados %}
      <li>{{ livro.titulo }}</li>
    {% endfor %}
  </ul>
{% elif request.GET.q %}
  <p>Nenhum livro encontrado.</p>
{% endif %}

{% endblock %}
